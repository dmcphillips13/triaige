services:
  - type: web
    name: triaige-runner
    runtime: python
    repo: https://github.com/dmcphillips13/triaige
    rootDir: apps/runner
    buildCommand: pip install uv && uv sync
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        value: triaige
      - key: LANGCHAIN_TRACING_V2
        value: "true"
      - key: CORS_ORIGINS
        value: "https://triaige-dashboard.vercel.app"
